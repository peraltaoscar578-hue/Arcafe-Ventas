<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Arcafé · Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0c0a05;--ink2:#1a1710;--ink3:#252210;
  --gold:#c8a84b;--gold2:#dfc06a;
  --ga12:rgba(200,168,75,.12);--ga22:rgba(200,168,75,.22);--ga35:rgba(200,168,75,.35);
  --cream:#f0e8d0;--cream2:#b8a878;--cream3:#7a6840;--cream4:#4a3e20;
  --red:#c84040;--ra12:rgba(200,64,64,.12);
  --green:#3a8840;--ga-g:rgba(58,136,64,.12);
  --orange:#c87820;--oa12:rgba(200,120,32,.12);
  --r:12px;--r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1.25rem 3rem}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--ga22)}
.brand{display:flex;align-items:center;gap:12px}
.brand-ico{width:40px;height:40px;border-radius:10px;background:var(--ga12);border:1px solid var(--ga22);display:flex;align-items:center;justify-content:center;font-size:18px}
.brand h1{font-family:'DM Serif Display',serif;font-size:26px;color:var(--gold2);letter-spacing:.04em;line-height:1}
.brand p{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--cream3);margin-top:3px}
.live{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cream3)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(58,136,64,.5);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-btn{background:var(--ink2);border:1px solid var(--ga22);border-radius:var(--r);padding:8px 14px;color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.08em;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.refresh-btn:active{background:var(--ga12);transform:scale(.97)}

/* LOCATION TABS */
.loc-tabs{display:flex;gap:8px;margin-bottom:1.5rem}
.loc-tab{flex:1;background:var(--ink2);border:1.5px solid rgba(255,255,255,.06);border-radius:var(--r-lg);padding:14px 18px;cursor:pointer;transition:all .15s;text-align:left}
.loc-tab.on{border-color:var(--ga35);background:linear-gradient(135deg,rgba(200,168,75,.14),rgba(200,168,75,.05))}
.loc-tab-name{font-family:'DM Serif Display',serif;font-size:19px;color:var(--cream);transition:color .15s}
.loc-tab.on .loc-tab-name{color:var(--gold2)}
.loc-tab-sub{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--cream3);margin-top:3px}

/* SESSION BANNER */
.sess-banner{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:14px 18px;border-radius:var(--r-lg);margin-bottom:1.25rem;flex-wrap:wrap}
.sess-banner.open{background:var(--ga-g);border:1px solid rgba(58,136,64,.28)}
.sess-banner.closed{background:var(--ink2);border:1px solid rgba(255,255,255,.06)}
.sess-banner.none{background:var(--ra12);border:1px solid rgba(200,64,64,.22)}
.sess-status{font-size:13px;font-weight:600}
.sess-detail{font-size:10px;color:var(--cream3);margin-top:2px}

/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--ink2);border:1px solid rgba(255,255,255,.05);border-radius:var(--r-lg);padding:16px 18px}
.stat.gold{background:linear-gradient(135deg,rgba(200,168,75,.16),rgba(200,168,75,.05));border-color:var(--ga22)}
.stat.grn{background:var(--ga-g);border-color:rgba(58,136,64,.2)}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--cream3);margin-bottom:8px}
.stat-val{font-family:'DM Serif Display',serif;font-size:30px;color:var(--cream);line-height:1}
.stat-val.g{color:var(--gold2)}
.stat-val.gr{color:var(--green);font-size:24px}
.stat-val.sm{font-size:17px;font-family:'DM Sans',sans-serif;font-weight:600;padding-top:4px}

/* SECTION HEADERS */
.sec-title{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--cream3);margin:1.75rem 0 .75rem;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--ga22),transparent)}

/* TWO COLUMN LAYOUT */
.grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:1.25rem}
@media(max-width:800px){.grid-2{grid-template-columns:1fr}}

/* PRODUCT RANKING */
.rank-list{background:var(--ink2);border:1px solid rgba(255,255,255,.05);border-radius:var(--r-lg);overflow:hidden}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.03)}
.rank-row:last-child{border-bottom:none}
.rank-n{font-family:'DM Serif Display',serif;font-size:14px;color:var(--cream3);width:18px;flex-shrink:0}
.rank-bar-wrap{flex:1;min-width:0}
.rank-name{font-size:13px;color:var(--cream);margin-bottom:5px;display:flex;justify-content:space-between;gap:8px}
.rank-name b{font-family:'DM Serif Display',serif;font-size:13px;color:var(--gold2);font-weight:400}
.rank-bar-bg{height:5px;border-radius:3px;background:rgba(255,255,255,.05);overflow:hidden}
.rank-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold2),var(--gold))}

/* STOCK LIST */
.stk-list{background:var(--ink2);border:1px solid rgba(255,255,255,.05);border-radius:var(--r-lg);overflow:hidden}
.stk-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.03)}
.stk-row:last-child{border-bottom:none}
.stk-name{font-size:13px;color:var(--cream)}
.stk-r{text-align:right}
.stk-val{font-family:'DM Serif Display',serif;font-size:16px;line-height:1}
.stk-val.ok{color:var(--green)}.stk-val.warn{color:var(--orange)}.stk-val.critical{color:var(--red)}
.stk-min{font-size:9px;color:var(--cream3);margin-top:2px}

/* MOVEMENTS */
.mov-list{background:var(--ink2);border:1px solid rgba(255,255,255,.05);border-radius:var(--r-lg);overflow:hidden;max-height:380px;overflow-y:auto}
.mov-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.03)}
.mov-row:last-child{border-bottom:none}
.mov-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mov-info{flex:1;min-width:0}
.mov-name{font-size:12px;color:var(--cream)}
.mov-det{font-size:9px;color:var(--cream3);margin-top:2px}
.mov-qty{font-family:'DM Serif Display',serif;font-size:14px;flex-shrink:0}
.mov-qty.pos{color:var(--green)}.mov-qty.neg{color:var(--red)}

/* EMPTY / LOADING */
.empty-msg{padding:2.5rem 1rem;text-align:center;color:var(--cream3);font-size:12px}
.empty-msg b{display:block;font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;color:var(--cream2);margin-bottom:6px}
.loading-msg{padding:2.5rem 1rem;text-align:center;color:var(--cream3);font-size:11px;letter-spacing:.08em;text-transform:uppercase}

.updated-at{text-align:center;font-size:9px;color:var(--cream4);letter-spacing:.08em;text-transform:uppercase;margin-top:2rem}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-ico">📊</div>
      <div>
        <h1>Arcafé</h1>
        <p>Panel de supervisión</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="live"><span class="live-dot"></span> En vivo</div>
      <button class="refresh-btn" onclick="loadAll(true)">↻ Actualizar</button>
    </div>
  </header>

  <div class="loc-tabs">
    <div class="loc-tab on" id="tab-aeropuerto" onclick="switchLoc('aeropuerto')">
      <div class="loc-tab-name">✈️ Aeropuerto</div>
      <div class="loc-tab-sub">Ver ventas y stock</div>
    </div>
    <div class="loc-tab" id="tab-teleferico" onclick="switchLoc('teleferico')">
      <div class="loc-tab-name">🚡 Teleférico Morado</div>
      <div class="loc-tab-sub">Ver ventas y stock</div>
    </div>
  </div>

  <div id="sess-banner" class="sess-banner none">
    <div><div class="sess-status">Cargando turno…</div></div>
  </div>

  <div class="stats">
    <div class="stat gold">
      <div class="stat-lbl">Total del día</div>
      <div class="stat-val g" id="s-total">Bs. 0.00</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Unidades vendidas</div>
      <div class="stat-val" id="s-units">0</div>
    </div>
    <div class="stat grn">
      <div class="stat-lbl">Café utilizado</div>
      <div class="stat-val gr" id="s-grams">0 g</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Más vendido</div>
      <div class="stat-val sm" id="s-top">—</div>
    </div>
  </div>

  <div class="grid-2">
    <div>
      <div class="sec-title">Ranking de productos hoy</div>
      <div class="rank-list" id="rank-list"><div class="loading-msg">Cargando…</div></div>
    </div>
    <div>
      <div class="sec-title">Stock actual</div>
      <div class="stk-list" id="stk-list"><div class="loading-msg">Cargando…</div></div>
    </div>
  </div>

  <div class="sec-title">Movimientos recientes</div>
  <div class="mov-list" id="mov-list"><div class="loading-msg">Cargando…</div></div>

  <div class="updated-at" id="updated-at">—</div>

</div>

<script>
const SUPABASE_URL = 'https://zjmvcbkkjetqrwbabepj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqbXZjYmtramV0cXJ3YmFiZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Mzc1NzgsImV4cCI6MjA5NzIxMzU3OH0.WBY4Uwry_GJj1nTPZBaTsacDrow3uyatlEhR_YKYmuo';

const CAT_ICONS_DASH = {cafe:'☕',hotdog:'🌭',food:'🫔',bag:'🛍️',mate:'🧉',combo:'⚡'};
const MOV_LABELS = {sale:'Venta',restock:'Reposición',adjustment:'Ajuste',waste:'Desperdicio',damage:'Dañado',opening:'Apertura',closing:'Cierre'};
const MOV_COLORS = {sale:'#c84040',restock:'#3a8840',adjustment:'#c8a84b',waste:'#c87820',damage:'#c84040',opening:'#3a8840',closing:'#c8a84b'};

let currentLoc = 'aeropuerto';
let refreshTimer = null;

async function sbGet(table, query=''){
  const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  if(!res.ok) throw new Error(`${table}: ${res.status}`);
  return res.json();
}

function todayRangeISO(){
  // Build local midnight boundaries, then convert to UTC correctly.
  // Using setHours+toISOString shifts the day in UTC-4 timezones (Bolivia),
  // causing yesterday's/today's sales to bleed into the wrong bucket.
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  const start = new Date(y, m, d, 0, 0, 0, 0);
  const end   = new Date(y, m, d, 23, 59, 59, 999);
  return { start: start.toISOString(), end: end.toISOString() };
}

function switchLoc(loc){
  currentLoc = loc;
  document.getElementById('tab-aeropuerto').classList.toggle('on', loc==='aeropuerto');
  document.getElementById('tab-teleferico').classList.toggle('on', loc==='teleferico');
  loadAll(true);
}

async function loadSession(loc){
  const today = new Date().toISOString().slice(0,10);
  try {
    const rows = await sbGet('daily_sessions', `?location_id=eq.${loc}&date=eq.${today}&limit=1`);
    const banner = document.getElementById('sess-banner');
    if(!rows.length){
      banner.className = 'sess-banner none';
      banner.innerHTML = `<div><div class="sess-status">⚠ Sin turno abierto hoy</div><div class="sess-detail">No se registró apertura para ${loc}</div></div>`;
      return;
    }
    const s = rows[0];
    if(s.status === 'open'){
      banner.className = 'sess-banner open';
      const t = s.opened_at ? new Date(s.opened_at).toLocaleTimeString('es-BO',{hour:'2-digit',minute:'2-digit'}) : '—';
      banner.innerHTML = `<div><div class="sess-status">✓ Turno abierto</div><div class="sess-detail">Desde las ${t}</div></div>`;
    } else {
      banner.className = 'sess-banner closed';
      const t = s.closed_at ? new Date(s.closed_at).toLocaleTimeString('es-BO',{hour:'2-digit',minute:'2-digit'}) : '—';
      banner.innerHTML = `<div><div class="sess-status">Turno cerrado</div><div class="sess-detail">Cerró a las ${t}</div></div>`;
    }
  } catch(e){
    console.warn('[Dashboard] session load error', e);
  }
}

async function loadSalesStats(loc){
  const { start, end } = todayRangeISO();
  try {
    const sales = await sbGet('sales', `?location_id=eq.${loc}&local_created_at=gte.${start}&local_created_at=lte.${end}&deleted_at=is.null&order=local_created_at.desc&limit=500`);

    const totalBs = sales.reduce((s,r)=> s + (Number(r.price)||0), 0);
    const totalUnits = sales.length;
    const totalGrams = sales.reduce((s,r)=> s + (Number(r.grams)||0), 0);

    document.getElementById('s-total').textContent  = 'Bs. ' + totalBs.toFixed(2);
    document.getElementById('s-units').textContent  = totalUnits;
    document.getElementById('s-grams').textContent  = totalGrams >= 1000 ? (totalGrams/1000).toFixed(2)+' kg' : totalGrams + ' g';

    // Ranking by product
    const byProduct = {};
    sales.forEach(r=>{
      const name = r.product_name || '—';
      if(!byProduct[name]) byProduct[name] = { count:0, bs:0 };
      byProduct[name].count++;
      byProduct[name].bs += Number(r.price)||0;
    });
    const ranked = Object.entries(byProduct)
      .map(([name,v])=>({name, ...v}))
      .sort((a,b)=> b.count - a.count);

    document.getElementById('s-top').textContent = ranked.length ? ranked[0].name : '—';

    const rankEl = document.getElementById('rank-list');
    if(!ranked.length){
      rankEl.innerHTML = `<div class="empty-msg"><b>Sin ventas todavía</b>Esperando la primera venta del día</div>`;
    } else {
      const maxCount = ranked[0].count;
      rankEl.innerHTML = ranked.map((r,i)=>`
        <div class="rank-row">
          <div class="rank-n">${i+1}</div>
          <div class="rank-bar-wrap">
            <div class="rank-name"><span>${r.name}</span><b>${r.count} · Bs.${r.bs.toFixed(0)}</b></div>
            <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${Math.max(4,(r.count/maxCount)*100)}%"></div></div>
          </div>
        </div>
      `).join('');
    }
  } catch(e){
    console.warn('[Dashboard] sales load error', e);
    document.getElementById('rank-list').innerHTML = `<div class="empty-msg"><b>Error al cargar</b>${e.message}</div>`;
  }
}

async function loadStock(loc){
  try {
    const rows = await sbGet('inventory_stock', `?location_id=eq.${loc}&order=item_name.asc`);
    const el = document.getElementById('stk-list');
    if(!rows.length){
      el.innerHTML = `<div class="empty-msg"><b>Sin datos de stock</b>Aún no se sincronizó inventario para este local</div>`;
      return;
    }
    el.innerHTML = rows.map(r=>{
      const stock = Number(r.stock)||0;
      // Heuristic thresholds since dashboard doesn't know minStock per item
      const cls = stock <= 0 ? 'critical' : stock < 20 ? 'warn' : 'ok';
      const display = (r.item_id==='leche' && stock>=1000) ? (stock/1000).toFixed(1)+' L'
                     : (r.item_id==='cafe' && stock>=1000) ? (stock/1000).toFixed(2)+' kg'
                     : stock + (r.item_id==='cafe'||r.item_id==='leche' ? (r.item_id==='cafe'?'g':'ml') : ' u');
      return `<div class="stk-row">
        <div class="stk-name">${r.item_name || r.item_id}</div>
        <div class="stk-r"><div class="stk-val ${cls}">${display}</div></div>
      </div>`;
    }).join('');
  } catch(e){
    console.warn('[Dashboard] stock load error', e);
    document.getElementById('stk-list').innerHTML = `<div class="empty-msg"><b>Error al cargar</b>${e.message}</div>`;
  }
}

async function loadMovements(loc){
  const { start, end } = todayRangeISO();
  try {
    const rows = await sbGet('inventory_movements', `?location_id=eq.${loc}&local_created_at=gte.${start}&local_created_at=lte.${end}&order=local_created_at.desc&limit=60`);
    const el = document.getElementById('mov-list');
    if(!rows.length){
      el.innerHTML = `<div class="empty-msg"><b>Sin movimientos hoy</b>Las ventas y ajustes aparecerán aquí</div>`;
      return;
    }
    el.innerHTML = rows.map(r=>{
      const isPos = Number(r.quantity) > 0;
      const time = r.local_created_at ? new Date(r.local_created_at).toLocaleTimeString('es-BO',{hour:'2-digit',minute:'2-digit'}) : '';
      return `<div class="mov-row">
        <div class="mov-dot" style="background:${MOV_COLORS[r.type]||'#888'}"></div>
        <div class="mov-info">
          <div class="mov-name">${r.item_name||r.item_id} <span style="color:var(--cream3);font-size:9px">${MOV_LABELS[r.type]||r.type}</span></div>
          <div class="mov-det">${time}${r.reason ? ' · '+r.reason : ''}</div>
        </div>
        <div class="mov-qty ${isPos?'pos':'neg'}">${isPos?'+':''}${r.quantity}</div>
      </div>`;
    }).join('');
  } catch(e){
    console.warn('[Dashboard] movements load error', e);
    document.getElementById('mov-list').innerHTML = `<div class="empty-msg"><b>Error al cargar</b>${e.message}</div>`;
  }
}

async function loadAll(manual){
  if(manual){
    document.getElementById('rank-list').innerHTML = '<div class="loading-msg">Actualizando…</div>';
  }
  await Promise.all([
    loadSession(currentLoc),
    loadSalesStats(currentLoc),
    loadStock(currentLoc),
    loadMovements(currentLoc)
  ]);
  document.getElementById('updated-at').textContent =
    'Última actualización: ' + new Date().toLocaleTimeString('es-BO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function startAutoRefresh(){
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(()=> loadAll(false), 30000);
}

loadAll(true);
startAutoRefresh();
</script>
</body>
</html>
